name: R tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-and-cli-tests:
    name: Unit and CLI tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022

    env:
      RENV_CONFIG_REPOS_OVERRIDE: https://cloud.r-project.org

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.0'
          use-public-rspm: true

      - name: Install Linux runtime libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libglpk40

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Verify renv status
        run: Rscript -e "renv::status()"

      - name: Run unit and CLI tests
        run: Rscript scripts/run_unit_tests.R
